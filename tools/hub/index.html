<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drum Book Practice Hub</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- OpenSheetMusicDisplay (OSMD) -->
    <script src="opensheetmusicdisplay.min.js"></script>
    <!-- WebMscore (MuseScore WebAssembly renderer) -->
    <script src="webmscore.js"></script>
    <!-- Exercise + book manifest (generated by tools/hub/generate-manifest.py) -->
    <script src="manifest.js"></script>
  </head>
  <body>
    <div class="hub-container">
      <!-- Sidebar: Exercise Browser -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>📚 Exercises</h1>
          <div class="sidebar-search">
            <input
              type="search"
              id="sidebarSearch"
              placeholder="Search…"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>
        <div class="sidebar-content">
          <div id="exercisesList"></div>
        </div>
      </aside>

      <!-- Main: Notation Viewer -->
      <main class="viewer">
        <div class="viewer-header">
          <h2 id="currentExercise">Select an exercise</h2>
          <div class="viewer-controls">
            <div class="renderer-toggle" title="Switch renderer">
              <button class="renderer-btn active" data-renderer="osmd">
                OSMD
              </button>
              <button class="renderer-btn" data-renderer="webmscore">
                webmscore
              </button>
            </div>
            <button id="zoomInBtn" class="zoom-btn" title="Zoom In">🔍+</button>
            <button id="zoomOutBtn" class="zoom-btn" title="Zoom Out">
              🔍−
            </button>
            <span id="zoomLevel">100%</span>
          </div>
        </div>
        <div id="osmdContainer" class="notation-container"></div>
        <div id="pdfContainer" class="pdf-container" style="display: none">
          <iframe id="pdfFrame" class="pdf-frame"></iframe>
        </div>
      </main>

      <!-- Right: Metronome + Music Player -->
      <aside class="right-panel">
        <div class="right-panel-tabs">
          <button class="right-tab active" data-tab="metronome">
            🥁 Metronome
          </button>
          <button class="right-tab" data-tab="player">🎼 Player</button>
        </div>

        <!-- Metronome tab -->
        <div class="right-tab-content active" id="metronomeTab">
          <div class="metronome-container">
            <iframe
              src="../metronome/index.html"
              class="metronome-iframe"
            ></iframe>
          </div>
        </div>

        <!-- Music Player tab -->
        <div class="right-tab-content" id="playerTab">
          <div id="playerLoading" class="player-loading">⏳ Loading stems…</div>
          <div class="player-tracks" id="playerTracks"></div>
          <div class="player-transport" id="playerTransport">
            <div class="transport-row">
              <span id="transportCurrent" class="transport-time-label"
                >0:00</span
              >
              <input
                type="range"
                id="transportSeek"
                class="transport-seek"
                min="0"
                step="0.1"
                value="0"
              />
              <span id="transportDuration" class="transport-time-label"
                >0:00</span
              >
            </div>
            <div class="transport-row transport-controls">
              <button id="seekBackBtn" class="transport-btn">«10</button>
              <button id="playPauseBtn" class="transport-btn play-btn">
                ▶
              </button>
              <button id="seekFwdBtn" class="transport-btn">10»</button>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <script src="script.js"></script>
  </body>
</html>
