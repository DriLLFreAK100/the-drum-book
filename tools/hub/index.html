<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drum Book Practice Hub</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- OpenSheetMusicDisplay Library -->
    <script src="opensheetmusicdisplay.min.js"></script>
  </head>
  <body>
    <div class="hub-container">
      <!-- Sidebar: Exercise Browser -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>📚 Exercises</h1>
        </div>
        <div class="sidebar-content">
          <div id="exercisesList"></div>
        </div>
      </aside>

      <!-- Main: Notation Viewer -->
      <main class="viewer">
        <div class="viewer-header">
          <h2 id="currentExercise">Select an exercise</h2>
          <div class="viewer-controls">
            <button id="zoomInBtn" class="zoom-btn" title="Zoom In">🔍+</button>
            <button id="zoomOutBtn" class="zoom-btn" title="Zoom Out">
              🔍−
            </button>
            <span id="zoomLevel">100%</span>
          </div>
        </div>
        <div id="osmdContainer" class="notation-container"></div>
      </main>

      <!-- Right: Metronome Tool -->
      <aside class="metronome-panel">
        <div class="metronome-header">
          <h2>🎵 Metronome</h2>
        </div>
        <div class="metronome-container">
          <iframe
            src="../metronome/index.html"
            class="metronome-iframe"
          ></iframe>
        </div>
      </aside>
    </div>

    <script src="script.js"></script>
  </body>
</html>
